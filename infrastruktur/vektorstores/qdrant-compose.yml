# Lokales Qdrant per Docker-Compose
# Start: docker compose -f qdrant-compose.yml up -d
# UI:    http://localhost:6333/dashboard

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ki-werkstatt-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}  # optional, schützt UI

volumes:
  qdrant_data:
    driver: local
