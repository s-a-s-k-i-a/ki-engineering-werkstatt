name: Typecheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Astral Ty type check
        run: uv run ty check werkzeuge/ tests/
        continue-on-error: true  # Ty ist noch alpha, brechen aber nicht den Build
