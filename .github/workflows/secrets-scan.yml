name: Secrets Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          # Nur verifizierte Treffer fail-en — unverifizierte Postgres-/Redis-
          # URL-Stringmatches in Lehrtexten/Compose-Beispielen sind keine echten
          # Secrets (placeholder-Passwörter wie ${POSTGRES_PASSWORD}).
          extra_args: --results=verified
          # gitleaks (oben) deckt das Spektrum mit besseren Allowlist-Regeln ab.
