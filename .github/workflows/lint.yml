name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  # Codespell läuft lokal via pre-commit und mit pyproject.toml-Konfig.
  # In CI deaktiviert, weil die GitHub-Action die deutsche Wörterbuchliste
  # in pyproject.toml nicht zuverlässig respektiert und unsere deutschen
  # Identifier (`feld`, `modul`, `praefix`, `Tage`) ständig moniert.
  # Lokal: `uv run codespell ...` (siehe pyproject.toml [tool.codespell]).

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !.venv
            !node_modules
            !dist-notebooks
