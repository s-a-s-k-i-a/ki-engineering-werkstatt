name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: codespell
        uses: codespell-project/actions-codespell@v2
        with:
          # codespell ist Englisch-zentriert — wir prüfen daher nur Code/Konfig
          # und schließen alle Markdown-/YAML-/Daten-Dateien aus, damit deutsche
          # Wörter wie 'als', 'ist', 'oder', 'Modell' nicht als Tippfehler gelten.
          path: "werkzeuge tests pyproject.toml"
          ignore_words_list: "iif,nd,te,tha,fo,ot,als,oder,ist,sie,vor,unter,Modell,modell,titel,Diagramm,Vektor,vektor,lokal,lokale,funktional,Warmup"

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !.venv
            !node_modules
            !dist-notebooks
