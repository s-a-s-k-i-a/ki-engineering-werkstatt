name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: python
          package-name: ki-engineering-werkstatt
          changelog-types: |
            [
              {"type":"feat","section":"Hinzugefügt","hidden":false},
              {"type":"fix","section":"Behoben","hidden":false},
              {"type":"compliance","section":"Compliance-Updates","hidden":false},
              {"type":"docs","section":"Dokumentation","hidden":false},
              {"type":"refactor","section":"Refactoring","hidden":false},
              {"type":"chore","section":"Wartung","hidden":true}
            ]
