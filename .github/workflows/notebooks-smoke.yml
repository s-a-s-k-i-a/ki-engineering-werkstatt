name: Notebooks Smoke (E2E headless)
on:
  push:
    branches: [main]
    paths:
      - "phasen/**/code/*.py"
      - "phasen/**/loesungen/*.py"
      - "projekte/**/src/*.py"
      - "werkzeuge/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "phasen/**/code/*.py"
      - "phasen/**/loesungen/*.py"
      - "projekte/**/src/*.py"
      - "werkzeuge/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        phase:
          - "00-werkzeugkasten"
          - "04-computer-vision"
          - "05-deutsche-tokenizer"
          - "06-sprache-und-audio"
          - "08-generative-modelle"
          - "09-state-space-und-hybride"
          - "10-llm-von-null"
          - "11-llm-engineering"
          - "12-finetuning-und-adapter"
          - "13-rag-tiefenmodul"
          - "14-agenten-und-mcp"
          - "15-autonome-systeme"
          - "16-reasoning-und-test-time"
          - "17-production-und-eu-hosting"
          - "18-ethik-safety-alignment"
          - "20-recht-und-governance"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - name: Install per-phase extras
        run: |
          case "${{ matrix.phase }}" in
            00-*) uv sync ;;
            04-*) uv sync ;;
            05-*) uv sync --extra tokenizer ;;
            06-*) uv sync ;;
            08-*) uv sync ;;
            09-*) uv sync ;;
            10-*) uv sync ;;
            11-*) uv sync ;;
            12-*) uv sync ;;
            13-*) uv sync --extra rag ;;
            14-*) uv sync ;;
            15-*) uv sync ;;
            16-*) uv sync ;;
            17-*) uv sync ;;
            18-*) uv sync ;;
            20-*) uv sync ;;
            *) uv sync ;;
          esac
      - name: Run notebook smoke test
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          TRANSFORMERS_OFFLINE: "0"
        run: |
          for nb in phasen/${{ matrix.phase }}/code/*.py phasen/${{ matrix.phase }}/loesungen/*.py; do
            [ -f "$nb" ] || continue
            echo "→ Smoke: $nb"
            uv run python werkzeuge/run_notebook_smoke.py "$nb" || exit 1
          done

  capstones:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync
      - name: Run capstone smoke tests
        run: |
          for nb in projekte/*/src/*.py; do
            [ -f "$nb" ] || continue
            echo "→ Smoke: $nb"
            uv run python werkzeuge/run_notebook_smoke.py "$nb" || exit 1
          done
